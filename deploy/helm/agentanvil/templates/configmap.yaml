apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "agentanvil.fullname" . }}-config
  labels:
    {{- include "agentanvil.labels" . | nindent 4 }}
data:
  AGENTANVIL_TRACES: "{{ .Values.traces.mountPath }}/traces.jsonl"
  NEXT_TELEMETRY_DISABLED: "1"
  {{- if .Values.langfuse.hostUrl }}
  LANGFUSE_HOST: {{ .Values.langfuse.hostUrl | quote }}
  {{- end }}
